<!DOCTYPE html>
<html>
<head>
  <title>PDF Viewer</title>
  <style>
    iframe {
      width: 100%;
      height: 95vh;
      border: none;
    }
  </style>
</head>
<body>

<!-- <h2>PDF Viewer</h2> -->

<iframe id="pdfFrame"></iframe>

<script>
  // Get PDF file name from URL
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");

  if (file) {
    document.getElementById("pdfFrame").src =
      file + "#toolbar=1&navpanes=0&zoom=100&page=1";
  }
</script>

</body>
</html>
